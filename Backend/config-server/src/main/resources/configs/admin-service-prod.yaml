server:
  port: 9008
  forward-headers-strategy: framework

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/campus_admin?useSSL=${DB_USE_SSL:false}&serverTimezone=Asia/Singapore&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath*:mapper/*.xml

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    root: INFO
