server:
  port: 9005
  forward-headers-strategy: framework

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT:3306}/campus_notification?useSSL=${DB_USE_SSL:false}&serverTimezone=Asia/Singapore&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    listener:
      ack-mode: manual

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.campusgo.domain
  type-handlers-package: com.campusgo.mybatis

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: ${EUREKA_SERVER_URL}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    root: INFO
